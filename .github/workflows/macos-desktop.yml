name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Install x11vnc
        run: brew install x11vnc

      - name: Enable Screen Sharing
        run: |
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true

      - name: Start x11vnc
        run: |
          x11vnc -display :0 -passwd mypassword -forever -bg -o /tmp/x11vnc.log
          sleep 5
          cat /tmp/x11vnc.log

      - name: Generate SSH key
        run: ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Write tunnel script
        run: |
          cat << 'EOF' > /tmp/tunnel.sh
          #!/bin/sh
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:5900 tcp@a.pinggy.io > /tmp/tunnel.log 2>/tmp/tunnel.err
          EOF
          chmod +x /tmp/tunnel.sh

      - name: Start tunnel
        run: |
          /tmp/tunnel.sh &
          sleep 10
          cat /tmp/tunnel.log
          cat /tmp/tunnel.err

      - name: Keep alive
        run: sleep 3300
