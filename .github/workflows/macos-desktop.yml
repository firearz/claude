name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Enable VNC Screen Sharing
        run: sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -clientopts -setvncpw -vncpw mypassword -restart -agent -privs -all

      - name: Set runner password
        run: sudo sysadminctl -resetPasswordFor runner -newPassword mypassword

      - name: Generate SSH key
        run: ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Write tunnel script
        run: |
          echo '#!/bin/sh' > /tmp/tunnel.sh
          echo 'ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:5900 tcp@a.pinggy.io > /tmp/tunnel.log 2>/tmp/tunnel.err' >> /tmp/tunnel.sh
          chmod +x /tmp/tunnel.sh

      - name: Start tunnel
        run: |
          /tmp/tunnel.sh &
          sleep 10
          cat /tmp/tunnel.log
          cat /tmp/tunnel.err

      - name: Keep alive
        run: sleep 3300
```

### What changed
- Switched to `tcp@a.pinggy.io` on port `443` — uses HTTPS port so it's rarely blocked
- No account or token needed

In the logs you should see:
```
tcp://rsng1.a.pinggy.io:XXXXX
