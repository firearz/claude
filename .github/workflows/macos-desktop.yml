name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Install TigerVNC
        run: brew install tiger-vnc

      - name: Create VNC password file
        run: |
          mkdir -p ~/.vnc
          echo "mypassword" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start Xvnc server
        run: |
          Xvnc :1 -rfbauth ~/.vnc/passwd -geometry 1280x800 -depth 24 -rfbport 5900 &
          sleep 5
          echo "VNC server started"

      - name: Generate SSH key
        run: ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Write tunnel script
        run: |
          cat << 'EOF' > /tmp/tunnel.sh
          #!/bin/sh
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:5900 tcp@a.pinggy.io > /tmp/tunnel.log 2>/tmp/tunnel.err
          EOF
          chmod +x /tmp/tunnel.sh

      - name: Start tunnel
        run: |
          /tmp/tunnel.sh &
          sleep 10
          cat /tmp/tunnel.log
          cat /tmp/tunnel.err

      - name: Keep alive
        run: sleep 3300
