name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Install dependencies
        run: brew install x11vnc xquartz

      - name: Start virtual display
        run: |
          Xvfb :1 -screen 0 1280x800x24 &
          sleep 5
          echo "Display ready"

      - name: Start x11vnc
        run: |
          DISPLAY=:1 x11vnc -passwd mypassword -forever -bg -noxdamage -o /tmp/x11vnc.log
          sleep 5
          cat /tmp/x11vnc.log

      - name: Generate SSH key
        run: ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Write tunnel script
        run: |
          cat << 'EOF' > /tmp/tunnel.sh
          #!/bin/sh
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:5900 tcp@a.pinggy.io > /tmp/tunnel.log 2>/tmp/tunnel.err
          EOF
          chmod +x /tmp/tunnel.sh

      - name: Start tunnel
        run: |
          /tmp/tunnel.sh &
          sleep 10
          cat /tmp/tunnel.log
          cat /tmp/tunnel.err

      - name: Keep alive
        run: sleep 3300
